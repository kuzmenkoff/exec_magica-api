services:
  db:
    image: postgres:16
    container_name: execmagica-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: execmagica
      POSTGRES_USER: execmagica
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - execmagica-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U execmagica -d execmagica"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: execmagica-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=db;Port=5432;Database=execmagica;Username=execmagica;Password=${POSTGRES_PASSWORD}"
      Jwt__Issuer: "ExecMagica"
      Jwt__Audience: "ExecMagicaClient"
      Jwt__ExpiryMinutes: "60"
      Jwt__Key: ${JWT_KEY}
      SeedAdmin__Email: ${SEED_ADMIN_EMAIL}
      SeedAdmin__Password: ${SEED_ADMIN_PASSWORD}
      ArtPath: /app/art
      DataProtectionKeysPath: /app/keys
    ports:
      - "127.0.0.1:8080:8080"   # localhost only — Caddy proxies to it
    volumes:
      - ./art:/app/art
      - execmagica-keys:/app/keys

volumes:
  execmagica-pgdata:
  execmagica-keys: